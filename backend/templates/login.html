<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centro Medico R.A.S.A</title>
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='hospital.svg') }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="contenedor-principal">
        <div class="tarjeta-login">
            <div class="icono-encabezado">
                <a href="/"><i class="fa-solid fa-lock"></i></a>
            </div>

            <h1>Bienvenido</h1>
            <p class="subtitulo">
                Ingresa tus datos para acceder al sistema
            </p>

            <form id="loginForm" method="POST" action="/auth/login">

                <div class="grupo-entrada">
                    <label>
                        <i class="fa-solid fa-user"></i> Usuario o Correo Electrónico
                    </label>
                    <input
                        type="text"
                        class="campo-texto"
                        id="usuario"
                        name="usuario"
                        placeholder="ej. juan.perez o juan@email.com"
                        autocomplete="username"
                        required>
                    <span class="help-text" id="usuarioHelp">Ingresa tu nombre de usuario o correo electrónico</span>
                </div>

                <div class="grupo-entrada">
                    <div class="fila-etiqueta">
                        <label>
                            <i class="fa-solid fa-key"></i> Contraseña
                        </label>
                        <a href="/recuperar" class="enlace-olvido">
                            ¿Olvidaste tu contraseña?
                        </a>
                    </div>

                    <div class="contenedor-password">
                        <input
                            type="password"
                            id="campoPassword"
                            class="campo-texto"
                            name="password"
                            placeholder="********"
                            autocomplete="current-password"
                            required>
                        <i class="fa-solid fa-eye icono-ojo" id="btnAlternarPassword"></i>
                    </div>
                    <span class="help-text" id="passwordHelp">Ingresa tu contraseña</span>
                </div>

                <div class="grupo-checkbox">
                    <input type="checkbox" id="recordar" name="recordar">
                    <label for="recordar">Mantener sesión iniciada</label>
                </div>
                <br>
                <button type="submit" class="boton-ingresar" id="btnIngresar">
                    Iniciar Sesión <i class="fa-solid fa-arrow-right"></i>
                </button>
            </form>

            <div id="mensajes"></div>

            <p class="enlace-registro">
                ¿Eres nuevo paciente? <a href="/auth/registro">Crear una cuenta</a>
            </p>
        </div>

        <div class="pie-seguridad">
            <i class="fa-solid fa-shield-halved"></i>
            ENCRIPTACIÓN SEGURA DE GRADO MÉDICO
        </div>
    </div>

    <div id="loginData"
        data-error="{{ error or '' }}"
        data-success="{{ success or '' }}"
        hidden>
    </div>

<script src="{{ url_for('static', filename='main.js') }}" defer></script>
</body>
</html>
