<!-- nuevaRecepcion.html -->
<form method="POST" action="{{ url_for('auth.register_recepcionista_admin') }}">
    <h3>Registro de Empleado</h3>
    
    <label>Tipo de Empleado:</label>
    <select name="tipo_empleado" required>
        <option value="">Seleccione...</option>
        <option value="Administrador">Administrador</option>
        <option value="Recepcionista">Recepcionista</option>
    </select>
    
    <label>Nombre:</label>
    <input type="text" name="nombre" required>
    
    <label>Apellido Paterno:</label>
    <input type="text" name="apellido_paterno" required>
    
    <label>Apellido Materno:</label>
    <input type="text" name="apellido_materno">
    
    <label>CURP:</label>
    <input type="text" name="curp" required>
    
    <label>Correo:</label>
    <input type="email" name="correo" required>
    
    <label>Teléfono:</label>
    <input type="text" name="telefono">
    
    <label>Fecha Contratación:</label>
    <input type="date" name="fecha_contratacion" required>
    
    <label>Usuario:</label>
    <input type="text" name="usuario" required>
    
    <label>Contraseña (opcional):</label>
    <input type="password" name="password">
    
    <!-- Campos para Recepcionista (se muestran solo cuando se selecciona Recepcionista) -->
    <div id="horariosRecepcion" style="display:none;">
        <label>Hora Inicio:</label>
        <input type="time" name="hora_inicio">
        
        <label>Hora Fin:</label>
        <input type="time" name="hora_fin">
    </div>
    
    <button type="submit">Registrar</button>
</form>

<script>
    // Mostrar/ocultar campos de horario según tipo de empleado
    document.querySelector('select[name="tipo_empleado"]').addEventListener('change', function() {
        const horariosDiv = document.getElementById('horariosRecepcion');
        if (this.value === 'Recepcionista') {
            horariosDiv.style.display = 'block';
            document.querySelector('input[name="hora_inicio"]').required = true;
            document.querySelector('input[name="hora_fin"]').required = true;
        } else {
            horariosDiv.style.display = 'none';
            document.querySelector('input[name="hora_inicio"]').required = false;
            document.querySelector('input[name="hora_fin"]').required = false;
        }
    });
</script>
