<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Centro Médico R.A.S.A</title>
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='hospital.svg') }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="contenedor-principal contenedor-registro">
        <div class="tarjeta-login">
            
            <div class="icono-encabezado">
                <a href="/"><i class="fa-solid fa-user-plus"></i></a>
            </div>

            <h1>Crear cuenta</h1>
            <p class="subtitulo">Completa tus datos personales para registrarte</p>

            <form method="POST" action="/auth/registro">

                <input type="hidden" name="rol" value="Paciente">

                <div class="grid-formulario">
                    
                    <div class="grupo-entrada campo-completo">
                        <label><i class="fa-solid fa-user"></i> Nombre(s)</label>
                        <input type="text" class="campo-texto" name="nombre" placeholder="ej. Juan" required>
                    </div>

                    <div class="grupo-entrada">
                        <label><i class="fa-solid fa-user"></i> Apellido Paterno</label>
                        <input type="text" class="campo-texto" name="apellido_paterno" placeholder="ej. Pérez" required>
                    </div>
                    <div class="grupo-entrada">
                        <label><i class="fa-solid fa-user"></i> Apellido Materno</label>
                        <input type="text" class="campo-texto" name="apellido_materno" placeholder="ej. López" required>
                    </div>

                    <div class="grupo-entrada">
                        <label><i class="fa-solid fa-id-card"></i> CURP</label>
                        <input type="text" class="campo-texto" name="curp" placeholder="18 caracteres" maxlength="18" style="text-transform: uppercase;" required>
                    </div>
                    <div class="grupo-entrada">
                        <label><i class="fa-solid fa-calendar-days"></i> Fecha de nacimiento</label>
                        <input type="date" class="campo-texto" name="fecha_nacimiento" required>
                    </div>

                    <div class="grupo-entrada">
                        <label><i class="fa-solid fa-droplet"></i> Tipo de sangre</label>
                        <div class="contenedor-select">
                            <select name="tipo_sangre" class="selector-rol" required>
                                <option value="" disabled selected>Selecciona tu tipo</option>
                                <option value="A+">A+</option>
                                <option value="A-">A-</option>
                                <option value="B+">B+</option>
                                <option value="B-">B-</option>
                                <option value="AB+">AB+</option>
                                <option value="AB-">AB-</option>
                                <option value="O+">O+</option>
                                <option value="O-">O-</option>
                            </select>
                            <i class="fa-solid fa-chevron-down flecha-select"></i>
                        </div>
                    </div>
                    <div class="grupo-entrada">
                        <label><i class="fa-solid fa-phone"></i> Teléfono</label>
                        <input type="tel" class="campo-texto" name="telefono" placeholder="10 dígitos" maxlength="10" required>
                    </div>

                    <div class="grupo-entrada campo-completo">
                        <label><i class="fa-solid fa-notes-medical"></i> Alergias (Si es el caso)</label>
                        <textarea class="campo-texto" name="alergias" placeholder="Especifica si tienes alguna alergia a medicamentos o alimentos (opcional)"></textarea>
                    </div>

                    <div class="grupo-entrada">
                        <label><i class="fa-solid fa-envelope"></i> Correo electrónico</label>
                        <input type="email" class="campo-texto" name="correo" placeholder="ej. j.perez@gmail.com" required>
                    </div>
                    <div class="grupo-entrada">
                        <label><i class="fa-solid fa-circle-user"></i> Nombre de usuario</label>
                        <input type="text" class="campo-texto" name="usuario" placeholder="Crea un usuario" required>
                    </div>

                    <div class="grupo-entrada">
                        <label><i class="fa-solid fa-key"></i> Contraseña</label>
                        <div class="contenedor-password">
                            <input type="password" id="campoPassword" class="campo-texto" name="password" placeholder="********" required>
                            <i class="fa-solid fa-eye icono-ojo" id="btnAlternarPassword"></i>
                        </div>
                    </div>
                    <div class="grupo-entrada">
                        <label><i class="fa-solid fa-check-double"></i> Confirmar Contraseña</label>
                        <div class="contenedor-password">
                            <input type="password" id="campoConfirmarPassword" class="campo-texto" name="confirmar_password" placeholder="********" required>
                            <i class="fa-solid fa-eye icono-ojo" id="btnAlternarConfirmar"></i>
                        </div>
                    </div>

                </div> <br>
                <button type="submit" class="boton-ingresar">
                    Registrarse <i class="fa-solid fa-arrow-right"></i>
                </button>
            </form>

            <p class="enlace-registro">
                ¿Ya tienes cuenta? <a href="/auth/login">Iniciar sesión</a>
            </p>
        </div>

        <div class="pie-seguridad">
            <i class="fa-solid fa-shield-halved" style="color: #007bff; margin-right: 5px;"></i>
            ENCRIPTACIÓN SEGURA DE GRADO MÉDICO
        </div>
    </div>

    <div id="registroData"
        data-error="{{ error or '' }}"
        data-success="{{ success or '' }}"
        hidden>
    </div>

<script src="{{ url_for('static', filename='main.js') }}" defer></script>
</body>
</html>
